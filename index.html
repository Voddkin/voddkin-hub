<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Breve...</title>
    <style>
        @font-face {
            font-family: 'EuropaGrotesk-Medium';
            src: url('assets/fonts/EUROPAGROTESKSH-MED.OTF') format('opentype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'EuropaGrotesk-Demibold';
            src: url('assets/fonts/EUROPA GROTESK SH DEMBOL.TTF') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'EuropaGrotesk-Bold';
            src: url('assets/fonts/EUROPA-GROTESK-SH-BOLD.OTF') format('opentype');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --bg-color: #030108;
            --cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-medium: 'EuropaGrotesk-Medium', sans-serif;
            --font-demibold: 'EuropaGrotesk-Demibold', sans-serif;
            --font-bold: 'EuropaGrotesk-Bold', sans-serif;
            --void-timing: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
            
            /* Variáveis globais geridas pelo JS para Zero-Lag */
            --skew-voddkin: 0deg;
            --parallax-x: 0px;
            --parallax-y: -50%;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none !important;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #050212 0%, var(--bg-color) 100%);
            color: var(--text-main);
            font-family: var(--font-medium);
        }

        .gpu-preload {
            position: absolute;
            left: -9999px;
            top: -9999px;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            will-change: transform;
            transform: translateZ(0);
        }

        #bg-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            pointer-events: none; z-index: 5;
        }

        .custom-cursor {
            position: fixed; top: 0; left: 0;
            width: 20px; height: 20px;
            background-color: #ffffff;
            border-radius: 50%; pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%) scale(1) translateZ(0);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s ease;
            will-change: transform;
        }
        .custom-cursor.hovering {
            transform: translate(-50%, -50%) scale(3) translateZ(0);
            background-color: rgba(255, 255, 255, 0.5);
        }

        #phase-1-text {
            position: absolute; left: 12%; top: 50%;
            transform: translateY(-50%) translateX(0px) translateZ(0);
            z-index: 10; display: flex; flex-direction: column; gap: 0.5rem;
            opacity: 1; filter: blur(0px);
            transition: transform 0.8s ease, opacity 0.8s ease, filter 0.8s ease;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 0, 0, 0.8);
            will-change: transform, opacity;
        }
        #phase-1-text.ghost {
            transform: translateY(-50%) translateX(-40px) translateZ(0);
            opacity: 0; filter: blur(10px);
        }

        .phase1-title {
            font-family: var(--font-demibold); font-size: 4rem; letter-spacing: 0.2em;
            color: #fff; text-shadow: 0 0 20px rgba(6, 182, 212, 0.6), 0 0 40px rgba(0, 0, 0, 1);
        }
        .phase1-subtitle {
            font-family: var(--font-medium); font-size: 1rem; letter-spacing: 0.4em;
            color: var(--cyan); text-transform: uppercase;
        }

        .hero-wrapper {
            position: absolute; top: 50%; right: 8%;
            margin-top: -22.5vh; z-index: 20;
            transition: transform var(--void-timing), opacity 0.5s ease-out;
            transform-origin: center center; pointer-events: auto;
            will-change: transform, opacity;
            transform: scale(1) translateZ(0);
        }
        .hero-character {
            height: 45vh; max-height: 450px; display: block;
            animation: complexFloat 5s ease-in-out infinite;
            user-select: none; -webkit-user-drag: none;
            will-change: transform;
            transform: translateY(0px) rotate(0deg) translateZ(0);
        }
        @keyframes complexFloat {
            0% { transform: translateY(0px) rotate(0deg) translateZ(0); }
            50% { transform: translateY(-15px) rotate(1deg) translateZ(0); }
            100% { transform: translateY(0px) rotate(0deg) translateZ(0); }
        }
        .hero-wrapper.ghost {
            transform: scale(1.8) translateZ(0); opacity: 0; pointer-events: none;
        }
        .hero-wrapper.ghost .hero-character { animation-play-state: paused; }

        #black-hole {
            position: absolute; width: 1px; height: 1px;
            background: radial-gradient(circle, #000000 0%, #010308 100%);
            border-radius: 50%; transform: translate(-50%, -50%) scale(1) translateZ(0);
            z-index: 15; pointer-events: none;
            transition: transform var(--void-timing), box-shadow var(--void-timing);
            box-shadow: 0 0 0px rgba(6, 182, 212, 0); will-change: transform;
        }
        #black-hole.active {
            transform: translate(-50%, -50%) scale(10000) translateZ(0);
            pointer-events: auto; box-shadow: 0 0 100px rgba(6, 182, 212, 0.15);
        }

        .film-grain {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0; pointer-events: none; z-index: 24; mix-blend-mode: overlay;
            transition: opacity 1s ease; will-change: transform, opacity;
        }
        #phase-2.active .film-grain {
            opacity: 0.15; animation: grainShift 0.2s steps(2) infinite;
        }
        @keyframes grainShift {
            0%, 100% { transform: translate(0, 0) translateZ(0); }
            10% { transform: translate(-2%, -2%) translateZ(0); }
            20% { transform: translate(-4%, 2%) translateZ(0); }
            30% { transform: translate(2%, -4%) translateZ(0); }
            40% { transform: translate(-2%, 4%) translateZ(0); }
            50% { transform: translate(4%, -2%) translateZ(0); }
            60% { transform: translate(2%, 2%) translateZ(0); }
            70% { transform: translate(-4%, -4%) translateZ(0); }
            80% { transform: translate(4%, 4%) translateZ(0); }
            90% { transform: translate(-2%, -2%) translateZ(0); }
        }

        #phase-2 {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 25; pointer-events: none; will-change: transform;
        }
        #phase-2.fade-out {
            opacity: 0; pointer-events: none; transition: opacity 1s ease;
        }

        .dark-texts {
            position: absolute; right: 8%; top: 50%;
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 1.5rem; text-align: right; will-change: transform;
            /* Lógica CSS Variables limpa e fluida */
            transform: translate(var(--parallax-x), var(--parallax-y)) skewX(calc(var(--skew-voddkin) * -2)) translateZ(0);
        }
        #phase-2.active .dark-texts {
            opacity: 1 !important; pointer-events: auto;
        }

        .clip-wrapper { overflow: hidden; padding: 30px; margin: -30px; }

        .dark-text-line {
            font-family: var(--font-bold); font-size: 8vw; line-height: 0.85;
            color: #ffffff; text-transform: uppercase; letter-spacing: -0.02em;
            transform: translateY(150%) translateZ(0);
            clip-path: polygon(-20% 0, 120% 0, 120% 100%, -20% 100%);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, text-shadow;
        }
        .clip-wrapper:nth-child(1) .dark-text-line { transition-delay: 0s; }
        .clip-wrapper:nth-child(2) .dark-text-line { transition-delay: 0.1s; }
        .clip-wrapper:nth-child(3) .dark-text-line { transition-delay: 0.2s; }

        #phase-2.active .dark-text-line {
            transform: translateY(0) translateZ(0);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            animation: textPulseWhite 1.2s infinite ease-in-out alternate;
        }
        #phase-2.active .clip-wrapper:nth-child(1) .dark-text-line { transition-delay: 0.8s; }
        #phase-2.active .clip-wrapper:nth-child(2) .dark-text-line { transition-delay: 0.95s; }
        #phase-2.active .clip-wrapper:nth-child(3) .dark-text-line { transition-delay: 1.1s; }

        @keyframes textPulseWhite {
            0% { text-shadow: 0 0 5px rgba(255, 255, 255, 0.05); }
            100% { text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
        }

        .hero-phase2-wrapper {
            position: absolute; left: 2%; bottom: 0;
            pointer-events: none; transform-origin: bottom center;
            will-change: transform;
            /* Removido o skewX para não seguir mais o mouse */
            transform: translateZ(0);
        }
        #phase-2.active .hero-phase2-wrapper {
            animation: phase2Breathe 4s ease-in-out infinite 1.5s;
        }
        @keyframes phase2Breathe {
            /* Removido o skewX daqui também. Agora ele só respira. */
            0% { transform: scaleY(1) scaleX(1) translateZ(0); }
            50% { transform: scaleY(1.015) scaleX(0.99) translateZ(0); }
            100% { transform: scaleY(1) scaleX(1) translateZ(0); }
        }

        /* Cinematographic Voddkin Entry */
        .hero-character-phase2 {
            height: 85vh; max-height: 900px; display: block;
            pointer-events: auto; /* IMPORTANTE PARA O LONG PRESS FUNCIONAR */
            opacity: 0; transform: scale(1.03) translateZ(0); filter: blur(15px);
            transform-origin: bottom center;
            -webkit-mask-image: linear-gradient(to top, transparent 0%, rgba(0,0,0,0.2) 5%, black 15%, black 100%);
            mask-image: linear-gradient(to top, transparent 0%, rgba(0,0,0,0.2) 5%, black 15%, black 100%);
            transition: opacity 1.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 1.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform, opacity, filter;
        }
        .glitch-entry {
            opacity: 1 !important; transform: scale(1) translateZ(0) !important; filter: blur(0px) !important;
        }
        .minor-glitch {
            transform: scale(1.02) translateX(5px) skewX(2deg) !important;
            filter: brightness(1.5) contrast(1.2) hue-rotate(90deg) !important;
            transition: none !important;
        }

        .btn-return-wrapper {
            position: absolute; bottom: 8%; left: 50%;
            transform: translateX(-50%) translateZ(0);
            width: 200px; height: 80px; display: flex;
            align-items: center; justify-content: center;
            pointer-events: none; z-index: 30; will-change: transform;
        }
        .btn-return {
            position: relative; display: flex; align-items: center; gap: 1rem;
            opacity: 0; transition: opacity 0.3s ease, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 1rem 2rem; background: transparent; border: none; outline: none;
            will-change: transform, opacity; transform: translateZ(0);
        }
        #phase-2.active .btn-return-wrapper { pointer-events: auto; }
        #phase-2.active .btn-return {
            opacity: 1; transition: opacity 1s ease 2s, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-text {
            font-family: var(--font-medium); font-size: 0.9rem; letter-spacing: 0.4em;
            color: rgba(255, 255, 255, 0.7); text-transform: uppercase;
            transition: color 0.4s ease; position: relative; z-index: 2;
        }
        .btn-bg-glow {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8) translateZ(0);
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50px; opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease; z-index: 1; filter: blur(10px);
            will-change: transform, opacity;
        }
        .btn-line-top, .btn-line-bottom {
            position: absolute; left: 50%; transform: translateX(-50%) translateZ(0);
            width: 0; height: 1px; background: rgba(255, 255, 255, 0.8);
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); will-change: width;
        }
        .btn-line-top { top: 0; }
        .btn-line-bottom { bottom: 0; }
        .btn-return:hover .btn-text { color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.8); }
        .btn-return:hover .btn-bg-glow { opacity: 1; transform: translate(-50%, -50%) scale(1.2) translateZ(0); }
        .btn-return:hover .btn-line-top, .btn-return:hover .btn-line-bottom { width: 100%; }

        /* EFEITO DE HOLD PREMIUM (GRAVITY PULL) - Zero tremedeira, 100% fluido */
        .hero-character-phase2.void-hold {
            transform: scale(0.94) translateY(10px) translateZ(0) !important;
            filter: drop-shadow(0 0 50px rgba(139, 92, 246, 0.7)) drop-shadow(0 0 100px rgba(0, 0, 0, 1)) brightness(0.8) contrast(1.3) !important;
            /* A transição dita que o efeito leva exatos 3 segundos para atingir o ápice */
            transition: all 3s cubic-bezier(0.25, 1, 0.5, 1) !important;
        }

        /* Estrutura da Fase 3 - Premium Minimalist */
        #phase-3 {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #080812 0%, #010103 100%);
            display: flex; flex-direction: column; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 1.5s ease; z-index: 1000;
        }

        #phase-3::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04; pointer-events: none; mix-blend-mode: overlay;
        }

        #phase-3.active { opacity: 1; pointer-events: auto; }
        
        .phase3-top-title {
            position: absolute; top: 8%; left: 50%; transform: translateX(-50%) translateY(-30px);
            /* FONTE CRAVADA PARA EUROPA GROTESK MEDIUM */
            font-family: var(--font-medium) !important; 
            font-weight: 500 !important;
            color: var(--text-muted); font-size: 0.8rem; letter-spacing: 0.5em;
            text-transform: uppercase; opacity: 0; filter: blur(10px);
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 1.5s ease, filter 1.5s ease;
        }
        
        .phase3-layout {
            display: flex; width: 100%; height: 100%; align-items: center; justify-content: space-between;
        }
        
        .phase3-left { 
            width: 40%; padding-left: 8%; z-index: 10;
        }
        
        #phase3-text-dynamic { will-change: transform, opacity, filter; }

        .phase3-main-title {
            font-family: var(--font-bold); font-size: 6.5vw; line-height: 0.85; color: #fff;
            text-transform: uppercase; letter-spacing: -0.02em;
            text-align: left; margin: 0; display: inline-block; white-space: nowrap;
            transform: translateX(-50px); opacity: 0; filter: blur(15px);
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s, opacity 1.5s ease 0.2s, filter 1.5s ease 0.2s;
        }
        
        /* O palco do Carrossel */
        .phase3-right {
            position: relative; width: 60%; height: 100vh; 
            perspective: 2000px; display: flex; align-items: center;
        }
        
        /* CARDS GIGANTES E VAZADOS */
        .project-card {
            position: absolute;
            width: 28vw; max-width: 450px; aspect-ratio: 3/4; 
            overflow: visible !important; transform-origin: center center;
            will-change: transform, opacity; opacity: 0; 
        }

        .card-entrance-wrapper {
            width: 100%; height: 100%; position: relative;
            transform: translateY(15vh) scale(0.9); opacity: 0; filter: blur(15px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #phase-3.active .project-card:nth-child(1) .card-entrance-wrapper { transition-delay: 0.4s; transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
        #phase-3.active .project-card:nth-child(2) .card-entrance-wrapper { transition-delay: 0.6s; transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
        #phase-3.active .project-card:nth-child(3) .card-entrance-wrapper { transition-delay: 0.8s; transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
        
        .card-img-wrapper {
            width: 100%; height: 100%; border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05); 
            background: rgba(20,20,25,0.4); backdrop-filter: blur(20px);
        }
        
        .card-img {
            width: 100%; height: 100%; object-fit: cover; opacity: 0.8;
            transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.5s ease;
        }
        .project-card:hover .card-img { transform: scale(1.08); opacity: 1; }
        
        /* Retângulo Inclinado Vazando pra fora */
        .card-diagonal-overlay {
            position: absolute; bottom: 10%; right: -15%; left: auto; width: auto; 
            background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); transform: skewX(-15deg); padding: 2vw 4vw; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .card-diagonal-overlay span {
            display: block; font-family: var(--font-bold); font-size: 1rem; letter-spacing: 0.3em; 
            color: #fff; transform: skewX(15deg);
        }

        /* Animações de Entrada */
        #phase-3.active .phase3-top-title { transform: translateX(-50%) translateY(0); opacity: 1; filter: blur(0); }
        #phase-3.active .phase3-main-title { transform: translateX(0); opacity: 1; filter: blur(0); }

        /* Animações de Saída Cinematográficas */
        #phase-3.fade-out .phase3-top-title { transform: translateX(-50%) translateY(-50px); opacity: 0; filter: blur(10px); transition: transform 1s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.8s ease, filter 0.8s ease; }
        #phase-3.fade-out .phase3-main-title { transform: translateX(-80px); opacity: 0; filter: blur(15px); transition: transform 1s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.8s ease, filter 0.8s ease; }
        #phase-3.fade-out .project-card { transform: translateY(100px) rotateX(20deg) !important; opacity: 0 !important; filter: blur(15px); transition: transform 1s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.8s ease, filter 0.8s ease; }

        /* Botão Return da Fase 3 */
        .p3-return { z-index: 1010; bottom: 5%; }
        #phase-3.active .p3-return .btn-return { opacity: 1; pointer-events: auto; }
        #phase-3.fade-out .p3-return .btn-return { opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }

    </style>
</head>
<body>

    <div class="vignette"></div>
    <div id="custom-cursor" class="custom-cursor"></div>

    <img src="VKpng.png" class="gpu-preload" alt="Preload Phase 2">
    <canvas id="bg-canvas"></canvas>
    <div class="film-grain"></div>

    <div id="phase-1-text">
        <div class="phase1-title">AURORA SYSTEM</div>
        <div class="phase1-subtitle">Awaiting Uplink // Standby</div>
    </div>

    <div id="hero-action-wrapper" class="hero-wrapper">
        <img src="chibiVKpng.png" id="hero-action" class="hero-character" alt="Character" crossorigin="anonymous">
    </div>

    <div id="black-hole"></div>

    <div id="phase-2">
        <div id="hero-phase2-wrapper" class="hero-phase2-wrapper">
            <img src="VKpng.png" id="hero-phase2" class="hero-character-phase2" alt="Materialized Character">
        </div>

        <div id="dark-texts-container" class="dark-texts">
            <div class="clip-wrapper"><div class="dark-text-line">VOID</div></div>
            <div class="clip-wrapper"><div class="dark-text-line">PROTOCOL</div></div>
            <div class="clip-wrapper"><div class="dark-text-line">INITIATED</div></div>
        </div>

        <div id="btn-return-wrapper" class="btn-return-wrapper">
            <button id="btn-return" class="btn-return">
                <div class="btn-bg-glow"></div>
                <div class="btn-line-top"></div>
                <span class="btn-text">VOLTAR</span>
                <div class="btn-line-bottom"></div>
            </button>
        </div>
    </div>

    <!-- Terminal Secreto / Fase 3 -->
    <div id="phase-3">
        <div class="phase3-top-title">JÁ QUE INSISTE TANTO EM TENTAR DESCOBRIR ALGO...</div>
        
        <div class="phase3-layout">
            <div class="phase3-left">
                <div id="phase3-text-dynamic">
                    <!-- O &nbsp; cria um espaço inquebrável, garantindo que o "A" não pule de linha -->
                    <h1 class="phase3-main-title">PROJETOS<br>A&nbsp;CAMINHO</h1>
                </div>
            </div>
            
            <div class="phase3-right" id="carousel-container">
                <div class="project-card card-1">
                    <div class="card-entrance-wrapper">
                        <div class="card-img-wrapper">
                            <div class="card-img" style="background: linear-gradient(135deg, #0a0a0a, #1a1a2e);"></div>
                        </div>
                        <div class="card-diagonal-overlay"><span>SGLM-O</span></div>
                    </div>
                </div>
                
                <div class="project-card card-2">
                    <div class="card-entrance-wrapper">
                        <div class="card-img-wrapper">
                            <div class="card-img" style="background: linear-gradient(135deg, #1e1b4b, #312e81);"></div>
                        </div>
                        <div class="card-diagonal-overlay"><span>ALBUM VOID</span></div>
                    </div>
                </div>
                
                <div class="project-card card-3">
                    <div class="card-entrance-wrapper">
                        <div class="card-img-wrapper">
                            <div class="card-img" style="background: linear-gradient(135deg, #0284c7, #06b6d4);"></div>
                        </div>
                        <div class="card-diagonal-overlay"><span>FAST PHARMA</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="btn-return-wrapper-p3" class="btn-return-wrapper p3-return">
            <button id="btn-return-p3" class="btn-return">
                <div class="btn-bg-glow"></div>
                <div class="btn-line-top"></div>
                <span class="btn-text">VOLTAR</span>
                <div class="btn-line-bottom"></div>
            </button>
        </div>
    </div>

<script>
(() => {
    'use strict';

    // ==========================================
    // 1. FINITE STATE MACHINE (FSM)
    // ==========================================
    const STATES = {
        STANDBY: 'STANDBY',             // Phase 1
        TRANSITIONING: 'TRANSITIONING', // Any animation between phases
        ACTIVE_VOID: 'ACTIVE_VOID',     // Phase 2
        ARCHIVES: 'ARCHIVES'            // Phase 3
    };
    let currentState = STATES.STANDBY;

    // ==========================================
    // 2. DOM ELEMENTS CACHE
    // ==========================================
    const DOM = {
        customCursor: document.getElementById('custom-cursor'),
        phase2: document.getElementById('phase-2'),
        phase3: document.getElementById('phase-3'),
        bgCanvas: document.getElementById('bg-canvas'),
        heroAction: document.getElementById('hero-action'),
        heroWrapper: document.getElementById('hero-action-wrapper'),
        blackHole: document.getElementById('black-hole'),
        btnReturn: document.getElementById('btn-return'),
        heroPhase2: document.querySelector('.hero-character-phase2'),
        phase1Text: document.getElementById('phase-1-text'),
        btnReturnWrapper: document.getElementById('btn-return-wrapper'),
        btnReturnP3: document.getElementById('btn-return-p3'),
        btnReturnWrapperP3: document.getElementById('btn-return-wrapper-p3'),
        phase3TextDynamic: document.getElementById('phase3-text-dynamic'),
        cards: document.querySelectorAll('.project-card')
    };

    // ==========================================
    // 3. GLOBAL VARIABLES & STATE
    // ==========================================
    // Mouse Tracking
    let rawMouseX = window.innerWidth / 2;
    let rawMouseY = window.innerHeight / 2;
    let cursorX = rawMouseX;
    let cursorY = rawMouseY;
    let lastMouseX = rawMouseX;
    let velocityX = 0;
    let currentSkew = 0;

    // Carousel Phase 3
    let scrollTarget = 0;
    let scrollCurrent = 0;
    const cardSpacing = window.innerWidth * 0.38;
    const initialOffset = window.innerWidth * 0.25;
    const maxScroll = initialOffset + ((DOM.cards.length - 1) * cardSpacing);
    let isDragging = false;
    let startX = 0;
    let scrollStart = 0;

    // Hitbox / CORS Fallback
    const offscreenCanvas = document.createElement('canvas');
    const offCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });
    let isImageLoaded = false;
    let isHoveringPixel = false;
    let isCORSBlocked = false;

    // Galaxy Engine
    const ctx = DOM.bgCanvas.getContext('2d', { alpha: false });
    let width, height, halfW, halfH;
    let stars = [];
    let renderList = [];
    const STAR_COUNT = 1200;
    const GALAXY_RADIUS = 1500;
    const SPIRAL_ARMS = 4;
    const ARM_SPREAD = 0.6;
    let targetRotX = Math.PI / 3;
    let targetRotY = 0;
    let currentRotX = targetRotX;
    let currentRotY = targetRotY;
    let autoRotY = 0;
    const starColors = ['#06b6d4', '#8b5cf6', '#3b82f6', '#0284c7'];
    const spriteCache = {};
    let globalTimeScale = 1.0;
    let isGalaxyPaused = false;
    let isCataclysmActive = false;
    let decelerationInterval = null;

    // Void Hold Phase 2 -> 3
    let holdTimer = null;
    let holdSeconds = 0;

    // Easter Egg
    const TARGET_WORD = "voddkin";
    let currentKeyIndex = 0;
    let easterEggTriggered = false;
    const AudioContextObj = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    const FREQ = { LOW_C: 130.81, C: 261.63, D: 293.66, E: 329.63, F: 349.23, G: 392.00, A: 440.00, B: 493.88 };
    const SCALE = [FREQ.C, FREQ.D, FREQ.E, FREQ.F, FREQ.G, FREQ.A, FREQ.B];
    const EXCEPTION_KEYS = ['v', 'o', 'd', 'k', 'i', 'n'];
    const successAudio = new Audio("https://cdn.freesound.org/previews/772/772277_12520441-lq.mp3");
    successAudio.volume = 1.0;

    // ==========================================
    // 4. INITIALIZATION (Sprites & Galaxy)
    // ==========================================
    function createStarSprite(color, type) {
        const c = document.createElement('canvas');
        const cCtx = c.getContext('2d');
        const radius = type === 'gas' ? 80 : (type === 'nebula' ? 30 : 8);
        c.width = radius * 2; c.height = radius * 2;
        const grad = cCtx.createRadialGradient(radius, radius, 0, radius, radius, radius);
        if (type === 'gas') { grad.addColorStop(0, color); grad.addColorStop(1, 'transparent'); }
        else if (type === 'nebula') { grad.addColorStop(0, color); grad.addColorStop(0.3, color); grad.addColorStop(1, 'transparent'); }
        else { grad.addColorStop(0, color); grad.addColorStop(0.2, color); grad.addColorStop(1, 'transparent'); }
        cCtx.fillStyle = grad; cCtx.fillRect(0, 0, c.width, c.height);
        return { canvas: c, radius: radius };
    }

    function preRenderSprites() {
        starColors.forEach(color => {
            spriteCache[color + '_star'] = createStarSprite(color, 'star');
            spriteCache[color + '_nebula'] = createStarSprite(color, 'nebula');
            spriteCache[color + '_gas'] = createStarSprite(color, 'gas');
        });
    }

    function initGalaxy() {
        width = DOM.bgCanvas.width = window.innerWidth;
        height = DOM.bgCanvas.height = window.innerHeight;
        halfW = width / 2; halfH = height / 2;
        stars = [];
        renderList = new Array(STAR_COUNT);

        for (let i = 0; i < STAR_COUNT; i++) {
            const distance = Math.pow(Math.random(), 3) * GALAXY_RADIUS;
            const armOffset = (Math.PI * 2 / SPIRAL_ARMS) * Math.floor(Math.random() * SPIRAL_ARMS);
            const finalAngle = distance * 0.004 + armOffset + (Math.random() - 0.5) * ARM_SPREAD;

            const ox = Math.cos(finalAngle) * distance;
            const oz = Math.sin(finalAngle) * distance;
            const oy = (Math.random() - 0.5) * ((1 - (distance / GALAXY_RADIUS)) * 100);
            const color = starColors[Math.floor(Math.random() * starColors.length)];

            const roll = Math.random();
            let type = roll > 0.9 ? 'gas' : (roll > 0.7 ? 'nebula' : 'star');
            let baseScale = roll > 0.9 ? Math.random() * 4 + 3 : (roll > 0.7 ? Math.random() * 2 + 1 : Math.random() * 1.2 + 0.3);

            const speed = 0.001 + (0.005 * (1 - distance / GALAXY_RADIUS));
            const sprite = spriteCache[color + '_' + type];

            stars.push({
                ox, oy, oz, baseScale, type,
                speed: speed,
                spriteCanvas: sprite.canvas, spriteRadius: sprite.radius,
                vx: 0, vy: 0, vz: 0
            });
            renderList[i] = { px: 0, py: 0, pz: 0, scale: 0, ref: stars[i] };
        }
    }

    // Hitbox init
    DOM.heroAction.onload = () => {
        offscreenCanvas.width = DOM.heroAction.naturalWidth || 1;
        offscreenCanvas.height = DOM.heroAction.naturalHeight || 1;
        try { offCtx.drawImage(DOM.heroAction, 0, 0); } catch (e) { /* CORS error swallowed on init */ }
        isImageLoaded = true;
    };
    if (DOM.heroAction.complete) DOM.heroAction.onload();

    preRenderSprites();
    initGalaxy();

    // ==========================================
    // 5. UNIFIED KINETIC MASTER LOOP
    // ==========================================
    let lastTime = performance.now();
    let animFrameId = null;

    function engineTick(timestamp) {
        // Delta time (max 50ms to prevent huge jumps if tab was inactive)
        let dt = timestamp - lastTime;
        if (dt > 50) dt = 16.6;
        lastTime = timestamp;

        // Use dt normalization factor (based on 60fps ~ 16.6ms)
        const timeFactor = dt / 16.666;

        // --- 5.1. Cursor Interpolation ---
        cursorX += (rawMouseX - cursorX) * 0.2 * timeFactor;
        cursorY += (rawMouseY - cursorY) * 0.2 * timeFactor;
        DOM.customCursor.style.left = `${cursorX}px`;
        DOM.customCursor.style.top = `${cursorY}px`;

        // --- 5.2. UI Interaction (Skew & Parallax) ---
        velocityX = rawMouseX - lastMouseX;
        lastMouseX = rawMouseX;

        if (currentState === STATES.ACTIVE_VOID) {
            const absVel = Math.abs(velocityX);
            let targetSkew = 0;
            if (absVel > 10) { targetSkew = Math.min(absVel * 0.1, 8) * (velocityX > 0 ? 1 : -1); }
            // Interpolate skew
            currentSkew += (targetSkew - currentSkew) * 0.1 * timeFactor;

            const xPercent = (rawMouseX / window.innerWidth) * 2 - 1;
            const yPercent = (rawMouseY / window.innerHeight) * 2 - 1;

            document.documentElement.style.setProperty('--skew-voddkin', `${currentSkew}deg`);
            document.documentElement.style.setProperty('--parallax-x', `${xPercent * -20}px`);
            document.documentElement.style.setProperty('--parallax-y', `${-50 + (yPercent * -10)}%`);
        }

        // --- 5.3. Phase 3 Carousel ---
        if (currentState === STATES.ARCHIVES && DOM.phase3.classList.contains('active') && !DOM.phase3.classList.contains('fade-out')) {
            scrollCurrent += (scrollTarget - scrollCurrent) * 0.08 * timeFactor;

            const dynamicText = DOM.phase3TextDynamic;
            if (dynamicText) {
                let textOpacity = Math.max(0, 1 - (scrollCurrent / 600));
                let translateFactor = -(scrollCurrent * 0.15);
                dynamicText.style.opacity = textOpacity;
                dynamicText.style.transform = `translateX(${translateFactor}px) translateZ(0)`;
            }

            DOM.cards.forEach((card, i) => {
                let x0 = initialOffset + (i * cardSpacing);
                let xPos = x0 - scrollCurrent;
                let absX = Math.abs(xPos);

                let scale = 1 - Math.min(absX / 1500, 0.4);
                let opacity = 1 - Math.min(absX / 800, 1);
                let rotateY = xPos * -0.02;

                card.style.transform = `translateX(${xPos}px) scale(${scale}) rotateY(${rotateY}deg) translateZ(0)`;
                card.style.opacity = opacity;
            });
        }

        // --- 5.4. Galaxy Engine ---
        if (!isGalaxyPaused) {
            ctx.fillStyle = '#050212';
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'lighter';

            currentRotX += (targetRotX - currentRotX) * 0.05 * globalTimeScale * timeFactor;
            currentRotY += (targetRotY - currentRotY) * 0.05 * globalTimeScale * timeFactor;
            autoRotY += 0.0005 * globalTimeScale * timeFactor;

            const totalRotY = currentRotY + autoRotY;
            const cosX = Math.cos(currentRotX);
            const sinX = Math.sin(currentRotX);
            const cosY = Math.cos(totalRotY);
            const sinY = Math.sin(totalRotY);

            const fov = 800; const zOffset = 1000;
            let visibleCount = 0;

            for (let i = 0; i < STAR_COUNT; i++) {
                let s = stars[i];

                if (isCataclysmActive) {
                    s.ox += s.vx * timeFactor;
                    s.oy += s.vy * timeFactor;
                    s.oz += s.vz * timeFactor;
                    const limit = 4000;
                    if (s.ox > limit || s.ox < -limit) s.vx *= -1;
                    if (s.oy > limit || s.oy < -limit) s.vy *= -1;
                    if (s.oz > limit || s.oz < -limit) s.vz *= -1;
                } else {
                    if (globalTimeScale > 0.01) {
                        const currentSpeed = s.speed * globalTimeScale * timeFactor;
                        const scaledCos = Math.cos(currentSpeed);
                        const scaledSin = Math.sin(currentSpeed);
                        const nx = s.ox * scaledCos - s.oz * scaledSin;
                        const nz = s.ox * scaledSin + s.oz * scaledCos;
                        s.ox = nx; s.oz = nz;
                    }
                }

                const y1 = s.oy * cosX - s.oz * sinX;
                const z1 = s.oy * sinX + s.oz * cosX;
                const finalX = s.ox * cosY + z1 * sinY;
                const finalZ = -s.ox * sinY + z1 * cosY;
                const zPos = finalZ + zOffset;

                if (zPos > 0) {
                    const scale = fov / zPos;
                    const projX = halfW + finalX * scale;
                    const projY = halfH + y1 * scale;

                    if (projX > -100 && projX < width + 100 && projY > -100 && projY < height + 100) {
                        let rl = renderList[visibleCount];
                        rl.px = Math.trunc(projX);
                        rl.py = Math.trunc(projY);
                        rl.pz = finalZ;
                        rl.scale = scale; rl.ref = s;
                        visibleCount++;
                    }
                }
            }

            let activeRenderList = renderList.slice(0, visibleCount);

            for (let i = 0; i < visibleCount; i++) {
                let p = activeRenderList[i];
                let s = p.ref;
                let finalScale = s.baseScale * p.scale;
                let drawRadius = s.spriteRadius * finalScale;
                let distAlpha = Math.min(1, Math.max(0.05, p.scale * 1.5));
                let finalAlpha = s.type === 'gas' ? distAlpha * 0.03 : (s.type === 'nebula' ? distAlpha * 0.2 : distAlpha * 0.6);

                ctx.globalAlpha = finalAlpha;
                ctx.drawImage(s.spriteCanvas, p.px - drawRadius, p.py - drawRadius, Math.trunc(drawRadius * 2), Math.trunc(drawRadius * 2));
            }

            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
        }

        animFrameId = requestAnimationFrame(engineTick);
    }

    // Start master loop
    animFrameId = requestAnimationFrame(engineTick);

    // ==========================================
    // 6. EVENT DELEGATION
    // ==========================================

    window.addEventListener('resize', () => {
        initGalaxy();
    });

    window.addEventListener('mousemove', (e) => {
        rawMouseX = e.clientX;
        rawMouseY = e.clientY;

        // Galaxy Target Rotation Update
        if(width && height) {
            const nx = (e.clientX / width) * 2 - 1;
            const ny = (e.clientY / height) * 2 - 1;
            targetRotX = (Math.PI / 3) + ny * 0.3;
            targetRotY = nx * 0.5;
        }

        // --- Global Mouse Move Handlers ---
        if (currentState === STATES.STANDBY) {
            if (isImageLoaded && !DOM.heroWrapper.classList.contains('ghost')) {
                const rect = DOM.heroAction.getBoundingClientRect();
                if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                    isHoveringPixel = true; // Fallback Seguro
                    if (!isCORSBlocked) {
                        try {
                            const scaleX = DOM.heroAction.naturalWidth / rect.width;
                            const scaleY = DOM.heroAction.naturalHeight / rect.height;
                            const x = Math.round((e.clientX - rect.left) * scaleX);
                            const y = Math.round((e.clientY - rect.top) * scaleY);

                            if (x >= 0 && x < offscreenCanvas.width && y >= 0 && y < offscreenCanvas.height) {
                                const pixelData = offCtx.getImageData(x, y, 1, 1).data;
                                isHoveringPixel = pixelData[3] > 0;
                            } else {
                                isHoveringPixel = false;
                            }
                        } catch (err) {
                            // CORS block - default to true if inside bounding box and stop trying
                            isCORSBlocked = true;
                        }
                    }
                    if (isHoveringPixel) DOM.customCursor.classList.add('hovering');
                    else DOM.customCursor.classList.remove('hovering');
                } else {
                    isHoveringPixel = false;
                    DOM.customCursor.classList.remove('hovering');
                }
            }
        } else if (currentState === STATES.ACTIVE_VOID) {
            // Check button hover
            const rect = DOM.btnReturnWrapper.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                DOM.btnReturn.style.transform = `translate(${(e.clientX - rect.left - rect.width / 2) * 0.3}px, ${(e.clientY - rect.top - rect.height / 2) * 0.3}px) translateZ(0)`;
                DOM.customCursor.classList.add('hovering');
            } else {
                DOM.btnReturn.style.transform = `translate(0px, 0px) translateZ(0)`;
                // Don't remove hover if we are dragging in another phase, but in phase 2 we can.
                // Exception: maybe we hover voddkin character? Phase 2 hero doesn't have custom hitbox.
                DOM.customCursor.classList.remove('hovering');
            }
        } else if (currentState === STATES.ARCHIVES) {
            // Drag logic
            if (isDragging) {
                scrollTarget = scrollStart + ((startX - e.clientX) * 1.5);
                scrollTarget = Math.max(0, Math.min(scrollTarget, maxScroll));
            }

            // Phase 3 return button hover
            const r3Rect = DOM.btnReturnWrapperP3.getBoundingClientRect();
            if (e.clientX >= r3Rect.left && e.clientX <= r3Rect.right && e.clientY >= r3Rect.top && e.clientY <= r3Rect.bottom) {
                DOM.btnReturnP3.style.transform = `translate(${(e.clientX - r3Rect.left - r3Rect.width / 2) * 0.3}px, ${(e.clientY - r3Rect.top - r3Rect.height / 2) * 0.3}px) translateZ(0)`;
                DOM.customCursor.classList.add('hovering');
            } else {
                DOM.btnReturnP3.style.transform = `translate(0px, 0px) translateZ(0)`;
                if(!isDragging) DOM.customCursor.classList.remove('hovering');
            }
        }
    });

    window.addEventListener('mouseup', () => {
        if (currentState === STATES.ARCHIVES && isDragging) {
            isDragging = false;
            DOM.customCursor.style.transform = `translate(-50%, -50%) scale(1) translateZ(0)`;
        }
    });

    window.addEventListener('wheel', (e) => {
        if (currentState === STATES.ARCHIVES && DOM.phase3.classList.contains('active') && !DOM.phase3.classList.contains('fade-out')) {
            scrollTarget += e.deltaY * 0.8;
            scrollTarget = Math.max(0, Math.min(scrollTarget, maxScroll));
        }
    });

    // ==========================================
    // 7. TRANSITIONS & CLICKS
    // ==========================================

    DOM.heroAction.addEventListener('click', () => {
        if (currentState !== STATES.STANDBY || !isHoveringPixel) return;

        currentState = STATES.TRANSITIONING;
        DOM.customCursor.classList.remove('hovering');

        const rect = DOM.heroWrapper.getBoundingClientRect();
        DOM.blackHole.style.left = `${rect.left + rect.width / 2}px`;
        DOM.blackHole.style.top = `${rect.top + rect.height / 2}px`;

        DOM.heroWrapper.classList.add('ghost');
        DOM.phase1Text.classList.add('ghost');

        if(decelerationInterval) clearInterval(decelerationInterval);
        decelerationInterval = setInterval(() => { globalTimeScale = Math.max(0, globalTimeScale - 0.1); }, 50);

        requestAnimationFrame(() => requestAnimationFrame(() => DOM.blackHole.classList.add('active') ));

        setTimeout(() => {
            DOM.phase2.classList.add('active');
            DOM.heroPhase2.classList.add('glitch-entry');
            isGalaxyPaused = true;
            currentState = STATES.ACTIVE_VOID;
        }, 1000);
    });

    DOM.btnReturn.addEventListener('click', () => {
        if (currentState !== STATES.ACTIVE_VOID) return;
        currentState = STATES.TRANSITIONING;
        DOM.customCursor.classList.remove('hovering');

        DOM.phase2.classList.remove('active');
        DOM.heroPhase2.classList.remove('glitch-entry');

        isGalaxyPaused = false;

        if(decelerationInterval) clearInterval(decelerationInterval);
        decelerationInterval = setInterval(() => { globalTimeScale = Math.min(1.0, globalTimeScale + 0.05); }, 50);

        setTimeout(() => {
            DOM.blackHole.classList.remove('active');
            DOM.heroWrapper.classList.remove('ghost');
            DOM.phase1Text.classList.remove('ghost');
            currentState = STATES.STANDBY;
        }, 800);
    });

    // --- PHASE 2 -> 3: VOID CHARGE (LONG PRESS) ---
    function cancelHold() {
        if (holdTimer) {
            clearInterval(holdTimer);
            holdTimer = null;
        }
        holdSeconds = 0;
        if(DOM.heroPhase2) DOM.heroPhase2.classList.remove('void-hold');
    }

    if (DOM.heroPhase2) {
        DOM.heroPhase2.addEventListener('mousedown', (e) => {
            if (currentState !== STATES.ACTIVE_VOID) return;
            e.preventDefault();
            holdSeconds = 0;
            DOM.heroPhase2.classList.add('void-hold');
            
            holdTimer = setInterval(() => {
                holdSeconds++;
                if (holdSeconds >= 3) {
                    cancelHold();
                    currentState = STATES.TRANSITIONING;
                    DOM.phase2.classList.add('fade-out');
                    DOM.phase3.classList.add('active');
                    setTimeout(() => { currentState = STATES.ARCHIVES; }, 1500); // Wait for transition
                }
            }, 1000);
        });

        DOM.heroPhase2.addEventListener('mouseup', cancelHold);
        DOM.heroPhase2.addEventListener('mouseleave', cancelHold);
    }

    // --- PHASE 3 DRAG MOUSE DOWN ---
    DOM.phase3.addEventListener('mousedown', (e) => {
        if (currentState === STATES.ARCHIVES && DOM.phase3.classList.contains('active') && !DOM.phase3.classList.contains('fade-out')) {
            isDragging = true; startX = e.clientX; scrollStart = scrollTarget;
            DOM.customCursor.style.transform = `translate(-50%, -50%) scale(0.5) translateZ(0)`;
        }
    });

    // --- PHASE 3 -> RETURN TO 2 ---
    DOM.btnReturnP3.addEventListener('click', () => {
        if (currentState !== STATES.ARCHIVES) return;
        currentState = STATES.TRANSITIONING;
        DOM.customCursor.classList.remove('hovering');

        DOM.phase3.classList.add('fade-out');

        setTimeout(() => {
            DOM.phase3.classList.remove('active');
            DOM.phase3.classList.remove('fade-out');
            DOM.phase2.classList.remove('fade-out');

            scrollTarget = 0;
            scrollCurrent = 0;
            if (DOM.phase3TextDynamic) {
                DOM.phase3TextDynamic.style.opacity = '';
                DOM.phase3TextDynamic.style.transform = '';
            }
            currentState = STATES.ACTIVE_VOID;
        }, 1000);
    });

    // ==========================================
    // 8. EASTER EGG & KEYLOGGER
    // ==========================================
    function playRetroBeep(frequency) {
        if (!audioCtx) audioCtx = new AudioContextObj();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);

        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.35);
    }

    function triggerGalaxyExplosion() {
        isCataclysmActive = true;
        if (isGalaxyPaused) isGalaxyPaused = false;
        stars.forEach(s => {
            s.vx = (Math.random() - 0.5) * 15;
            s.vy = (Math.random() - 0.5) * 15;
            s.vz = (Math.random() - 0.5) * 15;
            s.baseScale = s.baseScale * 3;
        });
    }

    window.addEventListener('keydown', (e) => {
        if (easterEggTriggered) return;

        if (currentState !== STATES.STANDBY) return; // Only in phase 1

        const key = e.key.toLowerCase();

        if (key === TARGET_WORD[currentKeyIndex]) {
            playRetroBeep(SCALE[currentKeyIndex]);
            currentKeyIndex++;

            if (currentKeyIndex === TARGET_WORD.length) {
                easterEggTriggered = true;
                setTimeout(() => {
                    successAudio.play().catch(e => console.log("Áudio bloqueado pelo navegador", e));
                    triggerGalaxyExplosion();
                }, 150);
            }
        } else {
            currentKeyIndex = 0;
            if (key === TARGET_WORD[0]) {
                playRetroBeep(SCALE[0]);
                currentKeyIndex = 1;
            } else if (EXCEPTION_KEYS.includes(key)) {
                playRetroBeep(FREQ.C);
            } else {
                playRetroBeep(FREQ.LOW_C);
            }
        }
    });

})();
</script>
</body>
</html>
