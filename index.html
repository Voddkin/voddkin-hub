<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LINK // STANDBY</title>
    <style>
        :root {
            --bg-color: #030712; /* Deep dark blue/black */
            --cyan: #06b6d4;
            --electric-blue: #3b82f6;
            --glass-bg: rgba(17, 24, 39, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow: rgba(6, 182, 212, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Main Wrapper */
        .wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* High-tech Pedestal / Glow under image */
        .pedestal-glow {
            position: absolute;
            bottom: -5%;
            width: 60vw;
            height: 20vh;
            background: radial-gradient(ellipse at center, var(--glow) 0%, transparent 70%);
            filter: blur(40px);
            z-index: 1;
            pointer-events: none;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            position: relative;
            z-index: 2;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
                        inset 0 0 0 1px rgba(255,255,255,0.05);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            max-width: 90vw;
        }

        /* Typographic elements */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 50px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cyan);
            margin-bottom: 2rem;
            transform: translateZ(30px);
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--cyan);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; box-shadow: 0 0 5px var(--cyan); }
            50% { opacity: 1; box-shadow: 0 0 15px var(--cyan); }
            100% { opacity: 0.5; box-shadow: 0 0 5px var(--cyan); }
        }

        .title {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 0.5rem;
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(40px);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 3rem;
            transform: translateZ(20px);
        }

        /* Hero Image Container */
        .hero-container {
            position: relative;
            width: 300px;
            height: 400px;
            border-radius: 20px;
            transform-style: preserve-3d;
            transform: translateZ(60px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, var(--electric-blue) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            filter: blur(30px);
            z-index: -1;
            pointer-events: none;
        }

        .glass-panel:hover .hero-container::before {
            opacity: 0.15;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
            transition: transform 0.1s ease-out;
            transform: translateZ(30px);
        }

        /* Decorative Grid / Lines */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.5;
            mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
        }

        /* Bottom Coordinates */
        .coordinates {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            z-index: 10;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="grid-overlay"></div>
    <div class="pedestal-glow"></div>

    <div class="wrapper" id="main-wrapper">
        <div class="glass-panel" id="glass-card">
            <div class="status-badge">System Standby</div>
            <h1 class="title">Initiating Sequence</h1>
            <p class="subtitle">Neural link awaiting connection</p>

            <div class="hero-container" id="hero-wrapper">
                <!-- A integridade visual do personagem é mantida intocada -->
                <img src="hero-image.png" alt="Protagonist" class="hero-image" id="hero-img">
            </div>
        </div>
    </div>

    <div class="coordinates">SYS.OP.VER 9.0.4 // UPLINK: DISCONNECTED</div>

    <script>
        // --------------------------------------------------------
        // 3D Tilt & Interactive Glow Effect
        // --------------------------------------------------------
        const card = document.getElementById('glass-card');
        const heroImg = document.getElementById('hero-img');
        const wrapper = document.getElementById('main-wrapper');

        wrapper.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;

            // Tilt the glass panel
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;

            // Parallax effect on the image
            const imgX = (window.innerWidth / 2 - e.pageX) / 50;
            const imgY = (window.innerHeight / 2 - e.pageY) / 50;
            heroImg.style.transform = `translateZ(40px) translate(${imgX}px, ${imgY}px)`;
        });

        wrapper.addEventListener('mouseenter', () => {
            card.style.transition = 'none';
            heroImg.style.transition = 'none';
        });

        wrapper.addEventListener('mouseleave', () => {
            card.style.transition = 'transform 0.5s ease';
            heroImg.style.transition = 'transform 0.5s ease';
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            heroImg.style.transform = `translateZ(30px) translate(0px, 0px)`;
        });

        // --------------------------------------------------------
        // Canvas Particle Network Background
        // --------------------------------------------------------
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height, particles;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];

            const particleCount = Math.floor(width * height / 15000);

            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 1.5 + 0.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx = -this.vx;
                if (this.y < 0 || this.y > height) this.vy = -this.vy;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(6, 182, 212, 0.5)';
                ctx.fill();
            }
        }

        // Mouse interaction with particles
        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                // Draw lines between close particles
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(6, 182, 212, ${0.15 - dist/800})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }

                // Mouse interaction
                if (mouse.x != null && mouse.y != null) {
                    const dx = particles[i].x - mouse.x;
                    const dy = particles[i].y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        particles[i].x += dx / 100;
                        particles[i].y += dy / 100;
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);

        initCanvas();
        animate();
    </script>
</body>
</html>
