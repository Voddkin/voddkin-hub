<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LINK // VOID PROTOCOL</title>
    <style>
        @font-face {
            font-family: 'EuropaGrotesk-Medium';
            src: url('assets/fonts/EUROPAGROTESKSH-MED.OTF') format('opentype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'EuropaGrotesk-Demibold';
            src: url('assets/fonts/EUROPA GROTESK SH DEMBOL.TTF') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'EuropaGrotesk-Bold';
            src: url('assets/fonts/EUROPA-GROTESK-SH-BOLD.OTF') format('opentype');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --bg-color: #030712;
            --cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-medium: 'EuropaGrotesk-Medium', sans-serif;
            --font-demibold: 'EuropaGrotesk-Demibold', sans-serif;
            --font-bold: 'EuropaGrotesk-Bold', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-medium);
        }

        /* Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Phase 1 Typography */
        #phase-1-texts {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .text-asym {
            position: absolute;
            font-family: var(--font-medium);
            color: var(--text-main);
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 0.8rem;
        }
        .t1 { top: 12%; left: 8%; }
        .t2 { bottom: 15%; left: 5%; transform: rotate(-90deg); transform-origin: left bottom; }
        .t3 { top: 30%; right: 45%; font-size: 0.6rem; letter-spacing: 0.6em; }
        .t4 { bottom: 20%; right: 10%; }

        /* Character Phase 1 */
        .hero-wrapper {
            position: absolute;
            top: 50%;
            right: 15%;
            transform: translate(0, -50%);
            z-index: 20;
            transition: top 0.8s cubic-bezier(0.25, 1, 0.5, 1),
                        right 0.8s cubic-bezier(0.25, 1, 0.5, 1),
                        transform 0.8s cubic-bezier(0.25, 1, 0.5, 1),
                        opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .hero-character {
            height: 60vh;
            max-height: 600px;
            cursor: pointer;
            animation: float 4s ease-in-out infinite;
            display: block;
            /* Rule of Gold: no filters or colorization! */
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        /* Ghost effect */
        .hero-wrapper.ghost {
            top: 50%;
            right: 50%;
            transform: translate(50%, -50%) scale(1.5);
            opacity: 0;
            pointer-events: none;
        }
        .hero-wrapper.ghost .hero-character {
            animation-play-state: paused;
        }

        /* Black Hole */
        #black-hole {
            position: absolute;
            width: 0;
            height: 0;
            background-color: #000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            pointer-events: none;
            transition: width 1s cubic-bezier(0.7, 0, 0.3, 1), height 1s cubic-bezier(0.7, 0, 0.3, 1);
        }
        #black-hole.active {
            width: 300vmax;
            height: 300vmax;
            pointer-events: auto;
        }

        /* Phase 2 */
        #phase-2 {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 25;
            pointer-events: none;
        }

        .dark-texts {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .dark-text-line {
            font-family: var(--font-bold);
            font-size: 10vw;
            line-height: 0.85;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            opacity: 0;
            transform: translateY(-40px);
            transition: opacity 1s cubic-bezier(0.25, 1, 0.5, 1), transform 1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #phase-2.active .dark-text-line {
            opacity: 1;
            transform: translateY(0);
        }
        #phase-2.active .dark-text-line:nth-child(1) { transition-delay: 0.6s; }
        #phase-2.active .dark-text-line:nth-child(2) { transition-delay: 0.8s; }
        #phase-2.active .dark-text-line:nth-child(3) { transition-delay: 1.0s; }

        .hero-character-secondary {
            position: absolute;
            right: 20%;
            top: 50%;
            transform: translateY(-50%) scaleX(-1);
            height: 70vh;
            max-height: 700px;
            opacity: 0;
            transition: opacity 2s ease 1.2s;
            pointer-events: none;
        }

        #phase-2.active .hero-character-secondary {
            opacity: 1;
        }

        /* Return Button */
        .btn-return {
            position: absolute;
            bottom: 8%;
            right: 8%;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease 2s;
        }
        .btn-text {
            font-family: var(--font-medium);
            font-size: 0.9rem;
            letter-spacing: 0.4em;
            color: #fff;
            text-transform: uppercase;
        }
        .btn-line {
            width: 40px;
            height: 1px;
            background-color: #fff;
            transition: width 0.3s ease;
        }
        .btn-return:hover .btn-line {
            width: 60px;
        }
        #phase-2.active .btn-return {
            opacity: 1;
            pointer-events: auto;
        }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <!-- Phase 1 Content -->
    <div id="phase-1-texts">
        <div class="text-asym t1">SYS.OP.VER 9.0.4</div>
        <div class="text-asym t2">NEURAL_LINK: STANDBY</div>
        <div class="text-asym t3">LAT 45.9080 // LON -12.4452</div>
        <div class="text-asym t4">SEC: ENCRYPTED_VOID</div>
    </div>

    <!-- The Action Character (Phase 1) -->
    <div id="hero-action-wrapper" class="hero-wrapper">
        <img src="chibiVKpng.png" id="hero-action" class="hero-character" alt="Character">
    </div>

    <!-- The Void (Black Hole) -->
    <div id="black-hole"></div>

    <!-- Phase 2 Content -->
    <div id="phase-2">
        <div class="dark-texts">
            <div class="dark-text-line">VOID</div>
            <div class="dark-text-line">PROTOCOL</div>
            <div class="dark-text-line">INITIATED</div>
        </div>
        <img src="chibiVKpng.png" class="hero-character-secondary" alt="Mirrored Character">

        <div id="btn-return" class="btn-return">
            <span class="btn-text">RETURN</span>
            <div class="btn-line"></div>
        </div>
    </div>

    <script>
        // Canvas Particle Network Background (Kept intact)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height, particles;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];

            const particleCount = Math.floor(width * height / 15000);

            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 1.5 + 0.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx = -this.vx;
                if (this.y < 0 || this.y > height) this.vy = -this.vy;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(6, 182, 212, 0.5)';
                ctx.fill();
            }
        }

        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(6, 182, 212, ${0.15 - dist/800})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }

                if (mouse.x != null && mouse.y != null) {
                    const dx = particles[i].x - mouse.x;
                    const dy = particles[i].y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        particles[i].x += dx / 100;
                        particles[i].y += dy / 100;
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();

        // --------------------------------------------------------
        // Ghost & Void Transitions Logic
        // --------------------------------------------------------
        const heroWrapper = document.getElementById('hero-action-wrapper');
        const heroAction = document.getElementById('hero-action');
        const blackHole = document.getElementById('black-hole');
        const phase2 = document.getElementById('phase-2');
        const btnReturn = document.getElementById('btn-return');

        heroAction.addEventListener('click', () => {
            // Calculate center of character for the black hole origin
            const rect = heroWrapper.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            blackHole.style.left = `${centerX}px`;
            blackHole.style.top = `${centerY}px`;

            // Trigger Ghost Effect
            heroWrapper.classList.add('ghost');

            // Trigger Black Hole
            setTimeout(() => {
                blackHole.classList.add('active');
            }, 50);

            // Show Phase 2 Elements
            setTimeout(() => {
                phase2.classList.add('active');
            }, 600); // Trigger while black hole expands
        });

        btnReturn.addEventListener('click', () => {
            // Revert Phase 2
            phase2.classList.remove('active');

            // Revert Black Hole after Phase 2 fades a bit
            setTimeout(() => {
                blackHole.classList.remove('active');
            }, 500);

            // Return Character to normal
            setTimeout(() => {
                heroWrapper.classList.remove('ghost');
            }, 1000);
        });

    </script>
</body>
</html>
