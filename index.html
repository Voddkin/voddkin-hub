<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LINK // VOID PROTOCOL v6 (Genesis Engine)</title>
    <style>
        @font-face {
            font-family: 'EuropaGrotesk-Medium';
            src: url('assets/fonts/EUROPAGROTESKSH-MED.OTF') format('opentype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'EuropaGrotesk-Demibold';
            src: url('assets/fonts/EUROPA GROTESK SH DEMBOL.TTF') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'EuropaGrotesk-Bold';
            src: url('assets/fonts/EUROPA-GROTESK-SH-BOLD.OTF') format('opentype');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            /* v6: Abyssal Background */
            --bg-color: #020024;
            --cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-medium: 'EuropaGrotesk-Medium', sans-serif;
            --font-demibold: 'EuropaGrotesk-Demibold', sans-serif;
            --font-bold: 'EuropaGrotesk-Bold', sans-serif;

            --void-timing: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* v6: Gradient background for abyssal galaxy feel */
            background: radial-gradient(circle at center, #0a0014 0%, var(--bg-color) 100%);
            color: var(--text-main);
            font-family: var(--font-medium);
        }

        /* 3D Galaxy Canvas */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* v6: Phase 1 Elegant Typography */
        #phase-1-text {
            position: absolute;
            left: 12%;
            top: 50%;
            transform: translateY(-50%) translateX(0px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            /* Exit Transition when moving to Void */
            opacity: 1;
            filter: blur(0px);
            transition: transform 0.8s ease, opacity 0.8s ease, filter 0.8s ease;
            pointer-events: none; /* Let galaxy receive events if needed */
        }

        #phase-1-text.ghost {
            /* Smooth luxurious exit */
            transform: translateY(-50%) translateX(-40px);
            opacity: 0;
            filter: blur(10px);
        }

        .phase1-title {
            font-family: var(--font-demibold);
            font-size: 4rem;
            letter-spacing: 0.2em;
            color: #fff;
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }

        .phase1-subtitle {
            font-family: var(--font-medium);
            font-size: 1rem;
            letter-spacing: 0.4em;
            color: var(--cyan);
            text-transform: uppercase;
        }


        /* Character Phase 1 */
        .hero-wrapper {
            position: absolute;
            top: 50%;
            right: 8%;
            margin-top: -22.5vh;
            z-index: 20;
            transition: transform var(--void-timing), opacity 0.5s ease-out;
            transform-origin: center center;
            pointer-events: auto;
        }

        .hero-character {
            height: 45vh;
            max-height: 450px;
            display: block;
            animation: complexFloat 5s ease-in-out infinite;
            user-select: none;
            -webkit-user-drag: none;
        }

        @keyframes complexFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .hero-wrapper.ghost {
            transform: scale(1.8);
            opacity: 0;
            pointer-events: none;
        }
        .hero-wrapper.ghost .hero-character {
            animation-play-state: paused;
        }

        /* Black Hole - The Void */
        #black-hole {
            position: absolute;
            width: 1px;
            height: 1px;
            background: radial-gradient(circle, #000000 0%, #010308 100%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(1);
            z-index: 15;
            pointer-events: none;
            transition: transform var(--void-timing), box-shadow var(--void-timing);
            box-shadow: 0 0 0px rgba(6, 182, 212, 0);
        }
        #black-hole.active {
            transform: translate(-50%, -50%) scale(10000);
            pointer-events: auto;
            box-shadow: 0 0 100px rgba(6, 182, 212, 0.15);
        }

        /* Animated Film Grain Overlay */
        .film-grain {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0;
            pointer-events: none;
            z-index: 24;
            mix-blend-mode: overlay;
            transition: opacity 1s ease;
        }

        #phase-2.active .film-grain {
            opacity: 0.15;
            animation: grainShift 0.2s steps(2) infinite;
        }

        @keyframes grainShift {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-2%, -2%); }
            20% { transform: translate(-4%, 2%); }
            30% { transform: translate(2%, -4%); }
            40% { transform: translate(-2%, 4%); }
            50% { transform: translate(4%, -2%); }
            60% { transform: translate(2%, 2%); }
            70% { transform: translate(-4%, -4%); }
            80% { transform: translate(4%, 4%); }
            90% { transform: translate(-2%, -2%); }
        }

        /* Phase 2 Container */
        #phase-2 {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 25;
            pointer-events: none;
        }

        /* Typography Phase 2 (Right Aligned) */
        .dark-texts {
            position: absolute;
            right: 8%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1.5rem;
            text-align: right;
            transition: transform 0.1s linear;
        }

        .clip-wrapper {
            overflow: hidden;
            padding-bottom: 0.2em;
            margin-bottom: -0.2em;
        }

        .dark-text-line {
            font-family: var(--font-bold);
            font-size: 8vw;
            line-height: 0.85;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -0.02em;

            transform: translateY(110%);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-shadow: 0 0 0px rgba(6, 182, 212, 0);
        }

        /* Rapid cascading fall on exit */
        .clip-wrapper:nth-child(1) .dark-text-line { transition-delay: 0s; }
        .clip-wrapper:nth-child(2) .dark-text-line { transition-delay: 0.1s; }
        .clip-wrapper:nth-child(3) .dark-text-line { transition-delay: 0.2s; }

        #phase-2.active .dark-text-line {
            transform: translateY(0);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            animation: textPulseGlow 4s infinite ease-in-out alternate;
        }

        /* Entry cascading rise */
        #phase-2.active .clip-wrapper:nth-child(1) .dark-text-line { transition-delay: 0.8s; }
        #phase-2.active .clip-wrapper:nth-child(2) .dark-text-line { transition-delay: 0.95s; }
        #phase-2.active .clip-wrapper:nth-child(3) .dark-text-line { transition-delay: 1.1s; }

        @keyframes textPulseGlow {
            0% { text-shadow: 0 0 5px rgba(6, 182, 212, 0.1); }
            100% { text-shadow: 0 0 25px rgba(6, 182, 212, 0.5); }
        }

        /* New Character Phase 2 Wrapper */
        .hero-phase2-wrapper {
            position: absolute;
            left: 2%;
            bottom: 0;
            pointer-events: none;
            transform-origin: bottom center;
        }

        #phase-2.active .hero-phase2-wrapper {
            animation: phase2Breathe 4s ease-in-out infinite 1.5s;
        }

        @keyframes phase2Breathe {
            0% { transform: scaleY(1) scaleX(1); }
            50% { transform: scaleY(1.015) scaleX(0.99); }
            100% { transform: scaleY(1) scaleX(1); }
        }

        /* New Character Phase 2 Image (Handles Materialization and Slide Down/Blur Exit) */
        .hero-character-phase2 {
            height: 85vh;
            max-height: 900px;
            display: block;

            opacity: 0;
            filter: blur(15px);
            transform: translateY(40px) scale(1.02);
            transition: opacity 0.8s ease, filter 0.8s ease, transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: bottom center;
        }

        .glitch-entry {
            animation: sciFiMaterialize 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes sciFiMaterialize {
            0% {
                opacity: 0;
                filter: blur(20px) brightness(3) drop-shadow(15px 0px 0px rgba(0, 255, 255, 0.8)) drop-shadow(-15px 0px 0px rgba(255, 0, 0, 0.8));
                transform: translateY(0px) scale(1.05);
            }
            20% {
                opacity: 0.5;
                filter: blur(10px) brightness(2) drop-shadow(5px 0px 0px rgba(0, 255, 255, 0.6)) drop-shadow(-5px 0px 0px rgba(255, 0, 0, 0.6));
                transform: translateY(0px) scale(1.03);
            }
            40% {
                opacity: 0.8;
                filter: blur(5px) brightness(1.5) drop-shadow(-10px 0px 0px rgba(0, 255, 255, 0.5)) drop-shadow(10px 0px 0px rgba(255, 0, 0, 0.5));
                transform: translateY(0px) scale(1.01);
            }
            100% {
                opacity: 1;
                filter: blur(0px) brightness(1) drop-shadow(0px 0px 0px rgba(0, 255, 255, 0)) drop-shadow(0px 0px 0px rgba(255, 0, 0, 0));
                transform: translateY(0px) scale(1);
            }
        }

        /* Magnetic Return Button */
        .btn-return-wrapper {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 30;
        }

        .btn-return {
            position: relative;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            outline: none;
        }

        #phase-2.active .btn-return-wrapper {
            pointer-events: auto;
        }
        #phase-2.active .btn-return {
            opacity: 1;
            transition: opacity 1s ease 2s, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-text {
            font-family: var(--font-medium);
            font-size: 0.9rem;
            letter-spacing: 0.4em;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            transition: color 0.4s ease;
            position: relative;
            z-index: 2;
        }

        /* Luxurious Hover Effects */
        .btn-bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50px;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 1;
            filter: blur(10px);
        }

        .btn-line-top, .btn-line-bottom {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.8);
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .btn-line-top { top: 0; }
        .btn-line-bottom { bottom: 0; }

        .btn-return:hover .btn-text {
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
        .btn-return:hover .btn-bg-glow {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }
        .btn-return:hover .btn-line-top,
        .btn-return:hover .btn-line-bottom {
            width: 100%;
        }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="film-grain"></div>

    <!-- v6: Phase 1 Elegant Typography -->
    <div id="phase-1-text">
        <div class="phase1-title">AURORA SYSTEM</div>
        <div class="phase1-subtitle">Awaiting Uplink // Standby</div>
    </div>

    <!-- Phase 1 Content -->
    <div id="hero-action-wrapper" class="hero-wrapper">
        <img src="chibiVKpng.png" id="hero-action" class="hero-character" alt="Character" crossorigin="anonymous">
    </div>

    <!-- The Void (Black Hole) -->
    <div id="black-hole"></div>

    <!-- Phase 2 Content -->
    <div id="phase-2">
        <div class="hero-phase2-wrapper">
            <img src="VKpng.png" id="hero-phase2" class="hero-character-phase2" alt="Materialized Character">
        </div>

        <div id="dark-texts-container" class="dark-texts">
            <div class="clip-wrapper"><div class="dark-text-line">VOID</div></div>
            <div class="clip-wrapper"><div class="dark-text-line">PROTOCOL</div></div>
            <div class="clip-wrapper"><div class="dark-text-line">INITIATED</div></div>
        </div>

        <div id="btn-return-wrapper" class="btn-return-wrapper">
            <button id="btn-return" class="btn-return">
                <div class="btn-bg-glow"></div>
                <div class="btn-line-top"></div>
                <span class="btn-text">RETURN</span>
                <div class="btn-line-bottom"></div>
            </button>
        </div>
    </div>

    <script>
        // --------------------------------------------------------
        // v6: 3D Galaxy Engine (Vanilla JS Canvas)
        // --------------------------------------------------------
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let stars = [];

        // Settings
        const STAR_COUNT = 3500;
        const GALAXY_RADIUS = 1500;
        const SPIRAL_ARMS = 4;
        const ARM_SPREAD = 0.5; // How thick the arms are

        // Core interaction
        let mouseX = 0;
        let mouseY = 0;
        let targetRotX = Math.PI / 3; // Initial tilt looking down slightly
        let targetRotY = 0;
        let currentRotX = targetRotX;
        let currentRotY = targetRotY;

        // Colors corresponding to Voddkin aesthetic
        const starColors = [
            '#06b6d4', // Cyan
            '#8b5cf6', // Violet
            '#3b82f6', // Electric Blue
            '#ffffff'  // Pure White core stars
        ];

        function initGalaxy() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];

            for (let i = 0; i < STAR_COUNT; i++) {
                // Logarithmic spiral distribution
                // Center weighted (more stars at distance ~0)
                const distance = Math.pow(Math.random(), 3) * GALAXY_RADIUS;

                // Which arm this star belongs to
                const armOffset = (Math.PI * 2 / SPIRAL_ARMS) * Math.floor(Math.random() * SPIRAL_ARMS);

                // The angle based on distance creates the spiral shape
                const spiralAngle = distance * 0.004;

                // Random scatter within the arm
                const scatterAngle = (Math.random() - 0.5) * ARM_SPREAD;
                const finalAngle = spiralAngle + armOffset + scatterAngle;

                // X, Z define the flat galactic plane. Y is thickness.
                const x = Math.cos(finalAngle) * distance;
                const z = Math.sin(finalAngle) * distance;

                // Thickness of galaxy (thicker at center, thinner at edges)
                const thickness = (1 - (distance / GALAXY_RADIUS)) * 100;
                const y = (Math.random() - 0.5) * thickness;

                // Pick a color
                const color = starColors[Math.floor(Math.random() * starColors.length)];

                // Base size - occasional large 'stardust' blobs
                const isNebula = Math.random() > 0.95;
                const size = isNebula ? Math.random() * 8 + 4 : Math.random() * 1.5 + 0.2;

                stars.push({
                    x, y, z,
                    ox: x, oy: y, oz: z,
                    size,
                    color,
                    isNebula,
                    // Orbital speed based on distance (Kepler's third law approx)
                    speed: 0.001 + (0.005 * (1 - distance / GALAXY_RADIUS))
                });
            }
        }

        // Mouse Parallax Logic
        window.addEventListener('mousemove', (e) => {
            // Update mouse vars for pixel perfect hitbox
            mouseX = e.clientX;
            mouseY = e.clientY;

            // Update rotation targets for 3D Engine
            // Normalize mouse between -1 and 1
            const nx = (e.clientX / width) * 2 - 1;
            const ny = (e.clientY / height) * 2 - 1;

            // Limit rotation to avoid flipping the galaxy upside down
            targetRotX = (Math.PI / 3) + ny * 0.3;
            targetRotY = nx * 0.5;
        });

        window.addEventListener('resize', initGalaxy);

        function rotate3D(x, y, z, rotX, rotY) {
            // Rotate around X axis
            let cosX = Math.cos(rotX);
            let sinX = Math.sin(rotX);
            let y1 = y * cosX - z * sinX;
            let z1 = y * sinX + z * cosX;

            // Rotate around Y axis
            let cosY = Math.cos(rotY);
            let sinY = Math.sin(rotY);
            let x2 = x * cosY + z1 * sinY;
            let z2 = -x * sinY + z1 * cosY;

            return { x: x2, y: y1, z: z2 };
        }

        // Main render loop
        let autoRotY = 0;

        function animateGalaxy() {
            // Fade out previous frame slightly for motion blur (if desired, using clearRect for sharp stars)
            ctx.clearRect(0, 0, width, height);

            // Additive blending for gorgeous glowing stars and nebula dust
            ctx.globalCompositeOperation = 'lighter';

            // Interpolate rotations for smooth inertia
            currentRotX += (targetRotX - currentRotX) * 0.05;
            currentRotY += (targetRotY - currentRotY) * 0.05;

            // Continual slow auto-rotation of the whole structure
            autoRotY += 0.0005;

            // Depth sorting: Sort stars by Z so far stars draw first
            const projectedStars = [];

            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];

                // Calculate individual orbit rotation (stars orbiting the center)
                let orbitCos = Math.cos(s.speed);
                let orbitSin = Math.sin(s.speed);
                let nx = s.ox * orbitCos - s.oz * orbitSin;
                let nz = s.ox * orbitSin + s.oz * orbitCos;
                s.ox = nx;
                s.oz = nz;

                // Apply global combined rotation (Auto + Mouse Parallax)
                let totalRotY = currentRotY + autoRotY;
                let p = rotate3D(s.ox, s.oy, s.oz, currentRotX, totalRotY);

                // Perspective projection
                let fov = 800;
                let zOffset = 1000; // Move galaxy forward into view
                let zPos = p.z + zOffset;

                if (zPos > 0) {
                    let scale = fov / zPos;
                    let projX = width / 2 + p.x * scale;
                    let projY = height / 2 + p.y * scale;

                    projectedStars.push({
                        px: projX,
                        py: projY,
                        pz: p.z,
                        scale: scale,
                        ref: s
                    });
                }
            }

            // Sort back to front
            projectedStars.sort((a, b) => b.pz - a.pz);

            // Draw
            for (let i = 0; i < projectedStars.length; i++) {
                let p = projectedStars[i];
                let s = p.ref;
                let scaledSize = s.size * p.scale;

                // Skip if offscreen
                if (p.px < 0 || p.px > width || p.py < 0 || p.py > height) continue;

                ctx.beginPath();
                ctx.arc(p.px, p.py, scaledSize, 0, Math.PI * 2);

                // Simulate distance opacity
                let alpha = Math.min(1, Math.max(0.1, p.scale * 1.5));

                if (s.isNebula) {
                    // Nebula: highly blurred, low opacity
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = s.color;
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.1})`;
                } else {
                    // Crisp star
                    ctx.shadowBlur = scaledSize * 2;
                    ctx.shadowColor = s.color;
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                }

                ctx.fill();
            }

            ctx.globalCompositeOperation = 'source-over'; // reset
            ctx.shadowBlur = 0; // reset

            requestAnimationFrame(animateGalaxy);
        }

        initGalaxy();
        animateGalaxy();

        // --------------------------------------------------------
        // Pixel-Perfect Hitbox (Alpha Channel)
        // --------------------------------------------------------
        const heroAction = document.getElementById('hero-action');
        const heroWrapper = document.getElementById('hero-action-wrapper');

        const offscreenCanvas = document.createElement('canvas');
        const offCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });
        let isImageLoaded = false;

        heroAction.onload = () => {
            offscreenCanvas.width = heroAction.naturalWidth;
            offscreenCanvas.height = heroAction.naturalHeight;
            offCtx.drawImage(heroAction, 0, 0);
            isImageLoaded = true;
        };
        if(heroAction.complete) heroAction.onload();

        let isHoveringPixel = false;

        heroAction.addEventListener('mousemove', (e) => {
            if (!isImageLoaded || heroWrapper.classList.contains('ghost')) return;

            const rect = heroAction.getBoundingClientRect();
            const scaleX = heroAction.naturalWidth / rect.width;
            const scaleY = heroAction.naturalHeight / rect.height;

            const x = Math.round((e.clientX - rect.left) * scaleX);
            const y = Math.round((e.clientY - rect.top) * scaleY);

            if (x >= 0 && x < offscreenCanvas.width && y >= 0 && y < offscreenCanvas.height) {
                const pixelData = offCtx.getImageData(x, y, 1, 1).data;
                const alpha = pixelData[3];

                if (alpha > 0) {
                    heroAction.style.cursor = 'pointer';
                    isHoveringPixel = true;
                } else {
                    heroAction.style.cursor = 'default';
                    isHoveringPixel = false;
                }
            } else {
                heroAction.style.cursor = 'default';
                isHoveringPixel = false;
            }
        });

        heroAction.addEventListener('mouseleave', () => {
            heroAction.style.cursor = 'default';
            isHoveringPixel = false;
        });


        // --------------------------------------------------------
        // Ghost & Void Transitions Logic
        // --------------------------------------------------------
        const blackHole = document.getElementById('black-hole');
        const phase2 = document.getElementById('phase-2');
        const btnReturn = document.getElementById('btn-return');
        const btnReturnWrapper = document.getElementById('btn-return-wrapper');
        const darkTextsContainer = document.getElementById('dark-texts-container');
        const heroPhase2 = document.getElementById('hero-phase2');
        const phase1Text = document.getElementById('phase-1-text');

        heroAction.addEventListener('click', (e) => {
            if (!isHoveringPixel) return;

            const rect = heroWrapper.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            blackHole.style.left = `${centerX}px`;
            blackHole.style.top = `${centerY}px`;

            // Trigger Phase 1 Exits
            heroWrapper.classList.add('ghost');
            phase1Text.classList.add('ghost'); // Elegant text exit

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    blackHole.classList.add('active');
                });
            });

            setTimeout(() => {
                phase2.classList.add('active');
                heroPhase2.classList.add('glitch-entry');
            }, 1000);
        });

        btnReturn.addEventListener('click', () => {
            phase2.classList.remove('active');
            heroPhase2.classList.remove('glitch-entry');

            setTimeout(() => {
                blackHole.classList.remove('active');
                heroWrapper.classList.remove('ghost');
                phase1Text.classList.remove('ghost'); // Elegant text return
            }, 800);
        });

        // --------------------------------------------------------
        // Magnetic Parallax for Typography in Phase 2
        // --------------------------------------------------------
        window.addEventListener('mousemove', (e) => {
            if (phase2.classList.contains('active')) {
                const screenX = window.innerWidth;
                const screenY = window.innerHeight;

                const xPercent = (e.clientX / screenX) * 2 - 1;
                const yPercent = (e.clientY / screenY) * 2 - 1;

                const parallaxX = xPercent * -20;
                const parallaxY = -50 + (yPercent * -10);

                darkTextsContainer.style.transform = `translate(${parallaxX}px, ${parallaxY}%)`;
            }
        });

        // --------------------------------------------------------
        // Magnetic Button Effect for RETURN
        // --------------------------------------------------------
        btnReturnWrapper.addEventListener('mousemove', (e) => {
            const rect = btnReturnWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;

            btnReturn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        });

        btnReturnWrapper.addEventListener('mouseleave', () => {
            btnReturn.style.transform = `translate(0px, 0px)`;
        });

    </script>
</body>
</html>
