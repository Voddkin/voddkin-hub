<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LINK // VOID PROTOCOL</title>
    <style>
        @font-face {
            font-family: 'EuropaGrotesk-Medium';
            src: url('assets/fonts/EUROPAGROTESKSH-MED.OTF') format('opentype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'EuropaGrotesk-Demibold';
            src: url('assets/fonts/EUROPA GROTESK SH DEMBOL.TTF') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'EuropaGrotesk-Bold';
            src: url('assets/fonts/EUROPA-GROTESK-SH-BOLD.OTF') format('opentype');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --bg-color: #030712;
            --cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-medium: 'EuropaGrotesk-Medium', sans-serif;
            --font-demibold: 'EuropaGrotesk-Demibold', sans-serif;
            --font-bold: 'EuropaGrotesk-Bold', sans-serif;
            /* Premium Synchronized Transition Timing */
            --void-timing: 1.2s cubic-bezier(0.8, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-medium);
        }

        /* Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Character Phase 1 */
        .hero-wrapper {
            position: absolute;
            top: 50%;
            right: 8%;
            transform: translateY(-50%);
            z-index: 20;
            /* Sync the disappearing effect with the black hole */
            transition: all var(--void-timing);
            /* Reset transform origin to character center for symmetrical scaling */
            transform-origin: center center;
        }

        .hero-character {
            height: 45vh;
            max-height: 450px;
            cursor: pointer;
            /* Complex float with slight rotation */
            animation: complexFloat 5s ease-in-out infinite;
            display: block;
        }

        @keyframes complexFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Ghost effect - synced with void */
        .hero-wrapper.ghost {
            /* We calculate translate dynamic in JS based on viewport center */
            /* Scale up and fade out */
            opacity: 0;
            pointer-events: none;
        }
        .hero-wrapper.ghost .hero-character {
            animation-play-state: paused;
        }

        /* Black Hole - The Void */
        #black-hole {
            position: absolute;
            width: 1px;
            height: 1px;
            background: radial-gradient(circle, #000000 0%, #010308 100%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(1);
            z-index: 15;
            pointer-events: none;
            /* Precise synchronization with the ghost character */
            transition: transform var(--void-timing);
        }
        #black-hole.active {
            /* 10000 ensures it covers any viewport size even from the far right edge */
            transform: translate(-50%, -50%) scale(10000);
            pointer-events: auto;
        }

        /* Phase 2 Container */
        #phase-2 {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 25;
            pointer-events: none;
        }

        /* Typography Phase 2 (Right Aligned) */
        .dark-texts {
            position: absolute;
            right: 8%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1.5rem;
            text-align: right;
        }

        /* Clip-path container for premium text reveal */
        .clip-wrapper {
            overflow: hidden;
            /* Pad slightly to prevent clipping descenders/ascenders */
            padding-bottom: 0.2em;
            margin-bottom: -0.2em;
        }

        .dark-text-line {
            font-family: var(--font-bold);
            font-size: 8vw;
            line-height: 0.85;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -0.02em;

            /* Prepare for clip-path reveal from bottom up */
            transform: translateY(110%);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #phase-2.active .dark-text-line {
            transform: translateY(0);
        }
        #phase-2.active .clip-wrapper:nth-child(1) .dark-text-line { transition-delay: 0.8s; }
        #phase-2.active .clip-wrapper:nth-child(2) .dark-text-line { transition-delay: 0.95s; }
        #phase-2.active .clip-wrapper:nth-child(3) .dark-text-line { transition-delay: 1.1s; }

        /* New Character Phase 2 (Left Aligned) */
        .hero-character-phase2 {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            height: 75vh;
            max-height: 800px;

            /* Fast exit state (no delay) when removing .active */
            opacity: 0;
            filter: blur(20px) brightness(2);
            transition: opacity 0.5s ease, filter 0.5s ease, transform 0.5s ease;
            pointer-events: none;
        }

        #phase-2.active .hero-character-phase2 {
            /* Heavy sci-fi materialization entry state */
            transition: opacity 2s cubic-bezier(0.16, 1, 0.3, 1) 1s,
                        filter 2.5s cubic-bezier(0.16, 1, 0.3, 1) 1s,
                        transform 3s cubic-bezier(0.16, 1, 0.3, 1) 0.8s;
            opacity: 1;
            filter: blur(0px) brightness(1);
            transform: translateY(-50%) scale(1.02);
        }

        /* Magnetic Return Button */
        .btn-return-wrapper {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 30;
        }

        .btn-return {
            position: relative;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 1s ease 2s, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            outline: none;
        }

        #phase-2.active .btn-return-wrapper {
            pointer-events: auto;
        }
        #phase-2.active .btn-return {
            opacity: 1;
        }

        .btn-text {
            font-family: var(--font-medium);
            font-size: 0.9rem;
            letter-spacing: 0.4em;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            transition: color 0.4s ease;
            position: relative;
            z-index: 2;
        }

        /* Luxurious Hover Effects */
        .btn-bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50px;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 1;
            filter: blur(10px);
        }

        .btn-line-top, .btn-line-bottom {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.8);
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .btn-line-top { top: 0; }
        .btn-line-bottom { bottom: 0; }

        .btn-return:hover .btn-text {
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
        .btn-return:hover .btn-bg-glow {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }
        .btn-return:hover .btn-line-top,
        .btn-return:hover .btn-line-bottom {
            width: 100%;
        }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <!-- Phase 1 Content (Cleaned up, only character) -->
    <div id="hero-action-wrapper" class="hero-wrapper">
        <img src="chibiVKpng.png" id="hero-action" class="hero-character" alt="Character">
    </div>

    <!-- The Void (Black Hole) -->
    <div id="black-hole"></div>

    <!-- Phase 2 Content -->
    <div id="phase-2">

        <!-- Left Side: New Character with Materialization -->
        <img src="VKpng.png" class="hero-character-phase2" alt="Materialized Character">

        <!-- Right Side: Typography -->
        <div class="dark-texts">
            <div class="clip-wrapper"><div class="dark-text-line">VOID</div></div>
            <div class="clip-wrapper"><div class="dark-text-line">PROTOCOL</div></div>
            <div class="clip-wrapper"><div class="dark-text-line">INITIATED</div></div>
        </div>

        <!-- Magnetic Return Button -->
        <div id="btn-return-wrapper" class="btn-return-wrapper">
            <button id="btn-return" class="btn-return">
                <div class="btn-bg-glow"></div>
                <div class="btn-line-top"></div>
                <span class="btn-text">RETURN</span>
                <div class="btn-line-bottom"></div>
            </button>
        </div>
    </div>

    <script>
        // --------------------------------------------------------
        // Canvas Particle Network Background
        // --------------------------------------------------------
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height, particles;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];

            const particleCount = Math.floor(width * height / 15000);

            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 1.5 + 0.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx = -this.vx;
                if (this.y < 0 || this.y > height) this.vy = -this.vy;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(6, 182, 212, 0.5)';
                ctx.fill();
            }
        }

        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(6, 182, 212, ${0.15 - dist/800})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }

                if (mouse.x != null && mouse.y != null) {
                    const dx = particles[i].x - mouse.x;
                    const dy = particles[i].y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        particles[i].x += dx / 100;
                        particles[i].y += dy / 100;
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();

        // --------------------------------------------------------
        // Ghost & Void Transitions Logic (Perfect Sync)
        // --------------------------------------------------------
        const heroWrapper = document.getElementById('hero-action-wrapper');
        const heroAction = document.getElementById('hero-action');
        const blackHole = document.getElementById('black-hole');
        const phase2 = document.getElementById('phase-2');
        const btnReturn = document.getElementById('btn-return');
        const btnReturnWrapper = document.getElementById('btn-return-wrapper');

        heroAction.addEventListener('click', () => {
            // Get center coordinates of the character
            const rect = heroWrapper.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Position the black hole exactly at character's center
            blackHole.style.left = `${centerX}px`;
            blackHole.style.top = `${centerY}px`;

            // Calculate translation needed to move character to center of screen
            // Account for the existing translateY(-50%) in the initial CSS
            const screenCenterX = window.innerWidth / 2;
            const screenCenterY = window.innerHeight / 2;
            const moveX = screenCenterX - centerX;
            const moveY = screenCenterY - centerY;

            // Apply ghost transition: move to center, scale up
            // Add back the -50% to counteract the base transform reset
            heroWrapper.style.transform = `translate(${moveX}px, calc(-50% + ${moveY}px)) scale(2)`;
            heroWrapper.classList.add('ghost');

            // Trigger Black Hole exactly concurrently (using a tiny timeout to ensure reflow)
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    blackHole.classList.add('active');
                });
            });

            // Show Phase 2 Elements after the void transition almost completes
            // --void-timing is 1.2s, so we trigger phase 2 at ~1s for seamless overlap
            setTimeout(() => {
                phase2.classList.add('active');
            }, 1000);
        });

        btnReturn.addEventListener('click', () => {
            // Revert Phase 2
            phase2.classList.remove('active');

            // Wait for Phase 2 elements to fade out before shrinking the void
            setTimeout(() => {
                blackHole.classList.remove('active');

                // Concurrently bring back the Phase 1 character
                heroWrapper.style.transform = `translateY(-50%)`;
                heroWrapper.classList.remove('ghost');
            }, 800);
        });

        // --------------------------------------------------------
        // Magnetic Button Effect for RETURN
        // --------------------------------------------------------
        btnReturnWrapper.addEventListener('mousemove', (e) => {
            const rect = btnReturnWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;

            // Attract the inner button slightly towards cursor
            btnReturn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        });

        btnReturnWrapper.addEventListener('mouseleave', () => {
            // Reset position
            btnReturn.style.transform = `translate(0px, 0px)`;
        });

    </script>
</body>
</html>
