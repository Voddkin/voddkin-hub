<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LINK // VOID PROTOCOL v3</title>
    <style>
        @font-face {
            font-family: 'EuropaGrotesk-Medium';
            src: url('assets/fonts/EUROPAGROTESKSH-MED.OTF') format('opentype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'EuropaGrotesk-Demibold';
            src: url('assets/fonts/EUROPA GROTESK SH DEMBOL.TTF') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'EuropaGrotesk-Bold';
            src: url('assets/fonts/EUROPA-GROTESK-SH-BOLD.OTF') format('opentype');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --bg-color: #030712;
            --cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-medium: 'EuropaGrotesk-Medium', sans-serif;
            --font-demibold: 'EuropaGrotesk-Demibold', sans-serif;
            --font-bold: 'EuropaGrotesk-Bold', sans-serif;

            /* v3: Absolute Synchronized Transition Timing */
            --void-timing: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-medium);
        }

        /* Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Character Phase 1 */
        .hero-wrapper {
            position: absolute;
            top: 50%;
            right: 8%;
            /* Fixed anchoring via margin instead of transform to allow pure scale transform */
            margin-top: -22.5vh;
            z-index: 20;
            /* Sync the disappearing effect with the black hole exactly */
            transition: transform var(--void-timing), opacity var(--void-timing);
            transform-origin: center center;
            /* Pointer events are handled manually via JS Alpha check */
            pointer-events: auto;
        }

        .hero-character {
            height: 45vh;
            max-height: 450px;
            /* Cursor pointer is now handled via JS dynamically */
            display: block;
            animation: complexFloat 5s ease-in-out infinite;
            /* Disable native dragging so it doesn't interrupt custom JS */
            user-select: none;
            -webkit-user-drag: none;
        }

        @keyframes complexFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* v3: In-Place Ghost effect */
        .hero-wrapper.ghost {
            /* Extreme zoom and fade strictly in place */
            transform: scale(3);
            opacity: 0;
            pointer-events: none;
        }
        .hero-wrapper.ghost .hero-character {
            animation-play-state: paused;
        }

        /* Black Hole - The Void */
        #black-hole {
            position: absolute;
            width: 1px;
            height: 1px;
            background: radial-gradient(circle, #000000 0%, #010308 100%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(1);
            z-index: 15;
            pointer-events: none;
            /* Precise synchronization with the ghost character */
            transition: transform var(--void-timing);
        }
        #black-hole.active {
            /* 10000 ensures it covers any viewport size */
            transform: translate(-50%, -50%) scale(10000);
            pointer-events: auto;
        }

        /* v3: Animated Film Grain Overlay */
        .film-grain {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0;
            pointer-events: none;
            z-index: 24; /* Under typography/character but over black hole */
            mix-blend-mode: overlay;
            transition: opacity 1s ease;
        }

        #phase-2.active .film-grain {
            opacity: 0.15;
            animation: grainShift 0.2s steps(2) infinite;
        }

        @keyframes grainShift {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-2%, -2%); }
            20% { transform: translate(-4%, 2%); }
            30% { transform: translate(2%, -4%); }
            40% { transform: translate(-2%, 4%); }
            50% { transform: translate(4%, -2%); }
            60% { transform: translate(2%, 2%); }
            70% { transform: translate(-4%, -4%); }
            80% { transform: translate(4%, 4%); }
            90% { transform: translate(-2%, -2%); }
        }


        /* Phase 2 Container */
        #phase-2 {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 25;
            pointer-events: none;
        }

        /* Typography Phase 2 (Right Aligned) */
        .dark-texts {
            position: absolute;
            right: 8%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1.5rem;
            text-align: right;
            /* Will be manipulated via JS for parallax */
            transition: transform 0.1s linear;
        }

        .clip-wrapper {
            overflow: hidden;
            padding-bottom: 0.2em;
            margin-bottom: -0.2em;
        }

        .dark-text-line {
            font-family: var(--font-bold);
            font-size: 8vw;
            line-height: 0.85;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -0.02em;

            transform: translateY(110%);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #phase-2.active .dark-text-line {
            transform: translateY(0);
        }
        #phase-2.active .clip-wrapper:nth-child(1) .dark-text-line { transition-delay: 0.8s; }
        #phase-2.active .clip-wrapper:nth-child(2) .dark-text-line { transition-delay: 0.95s; }
        #phase-2.active .clip-wrapper:nth-child(3) .dark-text-line { transition-delay: 1.1s; }

        /* v3: New Character Phase 2 (Anchored Left Bottom) */
        .hero-character-phase2 {
            position: absolute;
            left: 2%;
            bottom: 0; /* Anchored to bottom to hide crop */
            height: 85vh; /* Imposing half-body scale */
            max-height: 900px;

            /* Fast exit state (no delay) when removing .active */
            opacity: 0;
            filter: blur(20px) brightness(2) drop-shadow(0px 0px 0px rgba(0,255,255,0));
            transition: opacity 0.5s ease, filter 0.5s ease, transform 0.5s ease;
            pointer-events: none;
            transform-origin: bottom center;
        }

        /* Glitch entry animation class applied via JS */
        .glitch-entry {
            animation: sciFiMaterialize 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes sciFiMaterialize {
            0% {
                opacity: 0;
                filter: blur(20px) brightness(3) drop-shadow(15px 0px 0px rgba(0, 255, 255, 0.8)) drop-shadow(-15px 0px 0px rgba(255, 0, 0, 0.8));
                transform: scale(1.05);
            }
            20% {
                opacity: 0.5;
                filter: blur(10px) brightness(2) drop-shadow(5px 0px 0px rgba(0, 255, 255, 0.6)) drop-shadow(-5px 0px 0px rgba(255, 0, 0, 0.6));
                transform: scale(1.03);
            }
            40% {
                opacity: 0.8;
                filter: blur(5px) brightness(1.5) drop-shadow(-10px 0px 0px rgba(0, 255, 255, 0.5)) drop-shadow(10px 0px 0px rgba(255, 0, 0, 0.5));
                transform: scale(1.01);
            }
            100% {
                opacity: 1;
                filter: blur(0px) brightness(1) drop-shadow(0px 0px 0px rgba(0, 255, 255, 0)) drop-shadow(0px 0px 0px rgba(255, 0, 0, 0));
                transform: scale(1);
            }
        }

        /* Magnetic Return Button */
        .btn-return-wrapper {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 30;
        }

        .btn-return {
            position: relative;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 1s ease 2s, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            outline: none;
        }

        #phase-2.active .btn-return-wrapper {
            pointer-events: auto;
        }
        #phase-2.active .btn-return {
            opacity: 1;
        }

        .btn-text {
            font-family: var(--font-medium);
            font-size: 0.9rem;
            letter-spacing: 0.4em;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            transition: color 0.4s ease;
            position: relative;
            z-index: 2;
        }

        /* Luxurious Hover Effects */
        .btn-bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50px;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 1;
            filter: blur(10px);
        }

        .btn-line-top, .btn-line-bottom {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.8);
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .btn-line-top { top: 0; }
        .btn-line-bottom { bottom: 0; }

        .btn-return:hover .btn-text {
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
        .btn-return:hover .btn-bg-glow {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }
        .btn-return:hover .btn-line-top,
        .btn-return:hover .btn-line-bottom {
            width: 100%;
        }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="film-grain"></div>

    <!-- Phase 1 Content -->
    <div id="hero-action-wrapper" class="hero-wrapper">
        <!-- Add crossorigin="anonymous" to allow canvas pixel reading if served over network -->
        <img src="chibiVKpng.png" id="hero-action" class="hero-character" alt="Character" crossorigin="anonymous">
    </div>

    <!-- The Void (Black Hole) -->
    <div id="black-hole"></div>

    <!-- Phase 2 Content -->
    <div id="phase-2">
        <!-- Left Side: Anchored New Character -->
        <img src="VKpng.png" id="hero-phase2" class="hero-character-phase2" alt="Materialized Character">

        <!-- Right Side: Magnetic Parallax Typography -->
        <div id="dark-texts-container" class="dark-texts">
            <div class="clip-wrapper"><div class="dark-text-line">VOID</div></div>
            <div class="clip-wrapper"><div class="dark-text-line">PROTOCOL</div></div>
            <div class="clip-wrapper"><div class="dark-text-line">INITIATED</div></div>
        </div>

        <!-- Magnetic Return Button -->
        <div id="btn-return-wrapper" class="btn-return-wrapper">
            <button id="btn-return" class="btn-return">
                <div class="btn-bg-glow"></div>
                <div class="btn-line-top"></div>
                <span class="btn-text">RETURN</span>
                <div class="btn-line-bottom"></div>
            </button>
        </div>
    </div>

    <script>
        // --------------------------------------------------------
        // Canvas Particle Network Background
        // --------------------------------------------------------
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height, particles;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];

            const particleCount = Math.floor(width * height / 15000);

            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 1.5 + 0.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx = -this.vx;
                if (this.y < 0 || this.y > height) this.vy = -this.vy;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(6, 182, 212, 0.5)';
                ctx.fill();
            }
        }

        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(6, 182, 212, ${0.15 - dist/800})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }

                if (mouse.x != null && mouse.y != null) {
                    const dx = particles[i].x - mouse.x;
                    const dy = particles[i].y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        particles[i].x += dx / 100;
                        particles[i].y += dy / 100;
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();

        // --------------------------------------------------------
        // v3: Pixel-Perfect Hitbox (Alpha Channel)
        // --------------------------------------------------------
        const heroAction = document.getElementById('hero-action');
        const heroWrapper = document.getElementById('hero-action-wrapper');

        // Create an offscreen canvas to analyze pixel data
        const offscreenCanvas = document.createElement('canvas');
        const offCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });
        let isImageLoaded = false;

        heroAction.onload = () => {
            // Need intrinsic dimensions for pixel mapping
            offscreenCanvas.width = heroAction.naturalWidth;
            offscreenCanvas.height = heroAction.naturalHeight;
            offCtx.drawImage(heroAction, 0, 0);
            isImageLoaded = true;
        };
        // Trigger load manually in case it's already cached
        if(heroAction.complete) heroAction.onload();

        let isHoveringPixel = false;

        heroAction.addEventListener('mousemove', (e) => {
            if (!isImageLoaded || heroWrapper.classList.contains('ghost')) return;

            const rect = heroAction.getBoundingClientRect();
            // Calculate scale ratio between rendered size and natural size
            const scaleX = heroAction.naturalWidth / rect.width;
            const scaleY = heroAction.naturalHeight / rect.height;

            // Map mouse coordinates relative to the image bounds
            const x = Math.round((e.clientX - rect.left) * scaleX);
            const y = Math.round((e.clientY - rect.top) * scaleY);

            // Ensure coordinates are within natural bounds
            if (x >= 0 && x < offscreenCanvas.width && y >= 0 && y < offscreenCanvas.height) {
                // Get alpha channel (index 3) of the specific pixel
                const pixelData = offCtx.getImageData(x, y, 1, 1).data;
                const alpha = pixelData[3];

                if (alpha > 0) {
                    heroAction.style.cursor = 'pointer';
                    isHoveringPixel = true;
                } else {
                    heroAction.style.cursor = 'default';
                    isHoveringPixel = false;
                }
            } else {
                heroAction.style.cursor = 'default';
                isHoveringPixel = false;
            }
        });

        heroAction.addEventListener('mouseleave', () => {
            heroAction.style.cursor = 'default';
            isHoveringPixel = false;
        });


        // --------------------------------------------------------
        // v3: Ghost & Void Transitions Logic (In-Place & Sync)
        // --------------------------------------------------------
        const blackHole = document.getElementById('black-hole');
        const phase2 = document.getElementById('phase-2');
        const btnReturn = document.getElementById('btn-return');
        const btnReturnWrapper = document.getElementById('btn-return-wrapper');
        const darkTextsContainer = document.getElementById('dark-texts-container');
        const heroPhase2 = document.getElementById('hero-phase2');

        heroAction.addEventListener('click', (e) => {
            // Only trigger if we clicked an actual colored pixel!
            if (!isHoveringPixel) return;

            // Calculate EXACT center of the character
            const rect = heroWrapper.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Spawn black hole precisely at character's center
            blackHole.style.left = `${centerX}px`;
            blackHole.style.top = `${centerY}px`;

            // Ghost effect happens IN-PLACE via CSS class (transform: scale(3) opacity: 0)
            heroWrapper.classList.add('ghost');

            // Trigger Black Hole exactly concurrently
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    blackHole.classList.add('active');
                });
            });

            // Trigger Phase 2 Materialization
            // --void-timing is 1.2s. Start glitch entry seamlessly at 1s.
            setTimeout(() => {
                phase2.classList.add('active');
                heroPhase2.classList.add('glitch-entry');
            }, 1000);
        });

        btnReturn.addEventListener('click', () => {
            // Revert Phase 2
            phase2.classList.remove('active');

            // The phase2 character immediately loses glitch class so it fades out fast
            setTimeout(() => {
                heroPhase2.classList.remove('glitch-entry');
            }, 50);

            // Wait for Phase 2 elements to fade out before shrinking the void
            setTimeout(() => {
                blackHole.classList.remove('active');

                // Concurrently bring back the Phase 1 character in-place
                heroWrapper.classList.remove('ghost');
            }, 500);
        });

        // --------------------------------------------------------
        // v3: Magnetic Parallax for Typography in Phase 2
        // --------------------------------------------------------
        window.addEventListener('mousemove', (e) => {
            // Only apply parallax if Phase 2 is active
            if (phase2.classList.contains('active')) {
                const screenX = window.innerWidth;
                const screenY = window.innerHeight;

                // Calculate percentage of mouse position from center (-1 to 1)
                const xPercent = (e.clientX / screenX) * 2 - 1;
                const yPercent = (e.clientY / screenY) * 2 - 1;

                // Base Y transform is -50%. Add parallax shift.
                // Move text subtly in opposite direction of mouse for float effect
                const parallaxX = xPercent * -20; // max 20px shift
                const parallaxY = -50 + (yPercent * -10); // max 10px shift

                darkTextsContainer.style.transform = `translate(${parallaxX}px, ${parallaxY}%)`;
            }
        });

        // --------------------------------------------------------
        // Magnetic Button Effect for RETURN
        // --------------------------------------------------------
        btnReturnWrapper.addEventListener('mousemove', (e) => {
            const rect = btnReturnWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;

            // Attract the inner button slightly towards cursor
            btnReturn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        });

        btnReturnWrapper.addEventListener('mouseleave', () => {
            // Reset position
            btnReturn.style.transform = `translate(0px, 0px)`;
        });

    </script>
</body>
</html>
